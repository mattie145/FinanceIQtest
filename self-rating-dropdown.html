<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Literacy Assessment - Finance IQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=Georgia:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <!-- Split CSS: load order matters — base vars first, themes last -->
  <link rel="stylesheet" href="frontend/base.css">
  <link rel="stylesheet" href="frontend/screens.css">
  <link rel="stylesheet" href="frontend/components.css">
  <link rel="stylesheet" href="frontend/quiz.css">
  <link rel="stylesheet" href="frontend/results.css">
  <link rel="stylesheet" href="frontend/themes.css">
  <style>
    .slider-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    input#self-rating {
      flex: 1;
      height: 8px;
      border-radius: 5px;
      background: linear-gradient(to right, var(--border), var(--accent));
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    
    input#self-rating::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid #1c1c28;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
      transition: all .2s;
    }
    
    input#self-rating::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.6);
    }
    
    input#self-rating::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid #1c1c28;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
      transition: all .2s;
    }
    
    input#self-rating::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.6);
    }
    
    .slider-value {
      min-width: 45px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- INTRO -->
  <div id="intro-screen" class="screen active">
    <div class="logo">💸 Finance IQ</div>
    <p class="tagline">Financial Literacy Assessment</p>
    <div class="card">
      <label>What's your name?</label>
      <input type="text" id="name-input" placeholder="Enter your name..." maxlength="30">
      <label>What's your generation?</label>
      <select id="generation-input">
        <option value="">Select your generation...</option>
        <option value="Silent Generation" data-mode="elder">👴 Silent Generation (1928–1945)</option>
        <option value="Baby Boomers" data-mode="elder">Baby Boomers (1946–1964)</option>
        <option value="Generation X" data-mode="millennial">Generation X (1965–1980)</option>
        <option value="Millennials" data-mode="millennial">Millennials (1981–1996)</option>
        <option value="Generation Z" data-mode="genz">📱 Generation Z (1997–2012)</option>
        <option value="Generation Alpha" data-mode="genz">👶 Generation Alpha (2013–2025)</option>
        <option value="Generation Beta" data-mode="genz">Generation Beta (2026+)</option>
      </select>
      <label>What is your financial literacy level?</label>
      <div class="radio-group" id="exp-group">
        <div class="radio-btn" data-val="none">💀 Zero clue</div>
        <div class="radio-btn" data-val="some">🧩 Some basics</div>
        <div class="radio-btn" data-val="good">📈 Pretty solid</div>
        <div class="radio-btn" data-val="pro">🏦 Finance nerd</div>
      </div>
    </div>
    <button class="btn" id="start-btn">Let's Go →</button>
    <div style="text-align:center; margin-top:2rem;">
      <a href="frontend/home.html" style="color:#999; text-decoration:none;">← Back to Home</a>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" class="screen">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="q-meta">
      <span class="q-num" id="q-num-label">Question 1 of 20</span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="btn" id="next-btn" style="display:none;">Next →</button>
  </div>

  <!-- RESULTS -->
  <div id="results-screen" class="screen">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="results-content"></div>
    <button class="btn" id="restart-btn" style="margin-top:2rem;">Try Again ↻</button>
  </div>

</div>



<script type="module" src="frontend/main.js"></script>
</body>
</html>
